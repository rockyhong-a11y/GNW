name: Deploy to GitHub Pages

# Publishes the static site (index.html, app.js, styles.css, data/games.json, …)
# to GitHub Pages on every push to main. Requires the repo's Pages source to be
# set to "GitHub Actions" (Settings → Pages → Build and deployment → Source).
# configure-pages will enable it automatically when it has permission.

on:
  push:
    branches: [main]
  # 데이터 워크플로(Update game data) 완료 후 항상 배포.
  # 봇의 GITHUB_TOKEN 데이터 커밋은 push 이벤트를 트리거하지 못하므로(루프 방지),
  # workflow_run 으로 받아 스케줄/수동 데이터 갱신이 Pages 에 반드시 반영되게 한다.
  workflow_run:
    workflows: ["Update game data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
