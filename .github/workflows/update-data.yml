name: Update game data

# 데이터 수집 파이프라인. 스케줄(주기) 실행은 사용하지 않는다.
# 최신화는 (1) 웹앱이 진입 시 data/games.json 을 다시 불러오는 방식과
# (2) 필요할 때 아래 "Run workflow"(수동) 로 소스에서 재수집하는 방식으로 한다.

on:
  workflow_dispatch: {}     # 수동 실행 전용 (Actions 탭 → Run workflow)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dataset from sources + curated layer
        env:
          INVEN: "1"                                  # 인벤 발매 캘린더 자동 수집(러너는 환경 allowlist 영향 없음)
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}   # 저장소 Secrets 에 등록
        run: node scripts/build-data.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json data/_inven-debug.txt 2>/dev/null || git add data/games.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore(data): refresh games.json + 인벤 수집 진단"
            git push
          fi
