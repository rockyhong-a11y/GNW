name: Update game data

# 데이터 수집 파이프라인 — 인벤 발매 캘린더에서 자동 재수집.
# 최신화 경로:
#   (1) 웹앱이 진입/복귀 시 data/games.json 을 다시 불러옴(network-first),
#   (2) 아래 스케줄로 하루 2회 자동 재수집 → main 커밋 → (이 워크플로 완료를
#       deploy-pages 가 workflow_run 으로 받아) Pages 재배포,
#   (3) 필요 시 "Run workflow"(수동)로 즉시 재수집.
# "변경 시에만 커밋"이라 실제 일정이 바뀐 경우에만 커밋/배포가 일어난다.
# 주의: 봇의 데이터 커밋은 GITHUB_TOKEN 이라 push 로 다른 워크플로를 트리거하지 못한다.
#       그래서 Pages 배포는 push 가 아니라 workflow_run 으로 연결한다.

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/games.json"   # 봇의 데이터 커밋으로 인한 무한 재실행 방지
  schedule:
    - cron: "0 21 * * *"      # 매일 06:00 KST (전날 밤 갱신분 반영)
    - cron: "0 9 * * *"       # 매일 18:00 KST
  workflow_dispatch: {}       # 수동 실행 (Actions 탭 → Run workflow)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dataset from sources + curated layer
        env:
          INVEN: "1"                                  # 인벤 발매 캘린더 자동 수집(러너는 환경 allowlist 영향 없음)
          NEWS: "1"                                   # 루리웹 게임 뉴스 수집
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}   # 저장소 Secrets 에 등록
        run: node scripts/build-data.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore(data): refresh games.json + 인벤 수집 진단"
            git push
          fi
