<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f1a" />
  <meta name="description" content="PC · 콘솔 · 모바일 신작 출시 · 업데이트 · 행사 일정을 한눈에" />
  <title>GNW — Game New Watch</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <!-- 홈 화면에 추가(웹앱) 시 사용되는 아이콘 · 이름 -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="GNW" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="controls" aria-label="필터">
    <div class="filter-group" id="platformFilters" role="group" aria-label="플랫폼 필터"></div>
    <div class="filter-group" id="monthFilters" role="group" aria-label="월별 필터"></div>
  </nav>

  <main>
    <div class="result-bar">
      <span id="resultCount" class="result-count"></span>
      <div class="result-actions">
        <span id="refreshStatus" class="refresh-status" aria-live="polite"></span>
        <button id="refreshBtn" class="refresh-btn" type="button" title="최신 정보 갱신" aria-label="최신 정보 갱신">⟳</button>
      </div>
    </div>
    <div id="gameRoot" class="timeline" aria-live="polite"></div>
    <p id="emptyState" class="empty-state" hidden>조건에 맞는 게임이 없습니다.</p>
  </main>

  <footer class="app-footer">
    <p id="sources" class="sources"></p>
    <p class="footer-meta">
      <span id="lastUpdated"></span>
      <span class="footer-dot">·</span>
      <span>웹앱 + iOS 위젯</span>
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
