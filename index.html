<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f1a" />
  <meta name="description" content="PC · 콘솔 · 모바일 신작 출시 · 업데이트 · 행사 일정을 한눈에" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="GGG — Good Game, Gallantly" />
  <meta property="og:description" content="PC · 콘솔 · 모바일 신작 출시 · 업데이트 · 행사 일정을 한눈에" />
  <meta property="og:image" content="icons/icon-512.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="GGG — Good Game, Gallantly" />
  <meta name="twitter:description" content="PC · 콘솔 · 모바일 신작 출시 · 업데이트 · 행사 일정을 한눈에" />
  <title>GGG — Good Game, Gallantly</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <!-- 홈 화면에 추가(웹앱) 시 사용되는 아이콘 · 이름 -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="GGG" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- 게임 뉴스용 서체: 제목=Gothic A1(헤드라인, Google), 본문=Pretendard(로컬 woff2) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="controls" aria-label="기간">
    <select id="monthSelect" class="month-select" aria-label="기간 선택"></select>
    <button id="settingsBtn" class="settings-btn" type="button" aria-label="설정" title="설정">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3.2"/>
        <path d="M19.4 12c0-.5 0-.9-.1-1.4l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2.4-1.4L14.2 2H9.8l-.4 2.3a7 7 0 0 0-2.4 1.4l-2.3-1-2 3.4 2 1.5c-.1.5-.1.9-.1 1.4s0 .9.1 1.4l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2.4 1.4l.4 2.3h4.4l.4-2.3a7 7 0 0 0 2.4-1.4l2.3 1 2-3.4-2-1.5c.1-.5.1-.9.1-1.4z" stroke-linejoin="round"/>
      </svg>
    </button>
  </nav>

  <main>
    <div id="gameRoot" class="timeline" aria-live="polite"></div>
    <p id="emptyState" class="empty-state" hidden>조건에 맞는 게임이 없습니다.</p>
  </main>

  <footer class="app-footer">
    <p id="sources" class="sources"></p>
    <p class="footer-meta">
      <span id="lastUpdated"></span>
      <span class="footer-dot">·</span>
      <span>웹앱 + iOS 위젯</span>
    </p>
  </footer>

  <!-- 하단 탭 (뉴스 · 콘솔 · PC · 모바일 · 이벤트) — 콘텐츠 좌우 스와이프로도 전환 -->
  <nav class="tabbar" id="platformTabs" role="tablist" aria-label="탭">
    <button class="tab active" type="button" role="tab" data-cat="news" aria-selected="true">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 5h13v14H5a1.5 1.5 0 0 1-1.5-1.5V5z"/><path d="M17 8h2.5A1.5 1.5 0 0 1 21 9.5v8a1.5 1.5 0 0 1-3 0V5"/><line x1="7" y1="8.5" x2="13.5" y2="8.5" stroke-linecap="round"/><line x1="7" y1="12" x2="13.5" y2="12" stroke-linecap="round"/><line x1="7" y1="15.5" x2="11" y2="15.5" stroke-linecap="round"/></svg>
      <span>뉴스</span>
    </button>
    <button class="tab" type="button" role="tab" data-cat="release" aria-selected="false">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5 3 21l4.5-1.5"/><path d="M12 3c3.6 1.6 6 5.2 6 9l-3 3H9l-3-3c0-3.8 2.4-7.4 6-9z"/><circle cx="12" cy="9" r="1.6"/></svg>
      <span>출시</span>
    </button>
    <button class="tab" type="button" role="tab" data-cat="event" aria-selected="false">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><line x1="3" y1="9.5" x2="21" y2="9.5" stroke-linecap="round"/><line x1="8" y1="2.5" x2="8" y2="6.5" stroke-linecap="round"/><line x1="16" y1="2.5" x2="16" y2="6.5" stroke-linecap="round"/><circle cx="12" cy="14.5" r="1.6" fill="currentColor" stroke="none"/></svg>
      <span>이벤트</span>
    </button>
  </nav>

  <!-- 설정: 앱 아이콘(테마) 변경 -->
  <div id="settingsSheet" class="sheet-overlay" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-label="앱 아이콘 변경">
      <div class="sheet-head">
        <h2>앱 아이콘</h2>
        <button id="settingsClose" class="sheet-close" type="button" aria-label="닫기">✕</button>
      </div>
      <div class="icon-grid" id="iconGrid"></div>
      <button id="iconUploadBtn" class="icon-upload-btn" type="button">사진에서 선택…</button>
      <input id="iconFile" type="file" accept="image/*" hidden />
      <p class="sheet-note">아이콘을 고른 뒤 사파리 <b>공유 → 홈 화면에 추가</b>(이미 추가했다면 삭제 후 다시 추가)하면 홈 화면에 적용됩니다.</p>
    </div>
  </div>

  <!-- 아이콘 자르기(크롭) -->
  <div id="cropModal" class="sheet-overlay" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-label="아이콘 자르기">
      <div class="sheet-head">
        <h2>아이콘 자르기</h2>
        <button id="cropClose" class="sheet-close" type="button" aria-label="닫기">✕</button>
      </div>
      <div class="crop-stage">
        <canvas id="cropCanvas" width="264" height="264"></canvas>
      </div>
      <input id="cropZoom" class="crop-zoom" type="range" min="1" max="4" step="0.01" value="1" aria-label="확대" />
      <div class="crop-actions">
        <button id="cropApply" class="crop-apply" type="button">적용</button>
      </div>
      <p class="sheet-note">드래그로 위치, 슬라이더로 확대. 정사각형 영역이 앱 아이콘이 됩니다.</p>
    </div>
  </div>

  <!-- 뉴스 상세 (앱 내 다크 뷰) · 좌측에서 오른쪽으로 슬라이드하면 목록으로 복귀 -->
  <div id="detailSheet" class="detail-sheet" hidden>
    <div id="detailScroll" class="detail-scroll">
      <article id="detailBody" class="detail-content"></article>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
