<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f1a" />
  <meta name="description" content="PC · 콘솔 · 모바일 신작 출시 · 업데이트 · 행사 일정을 한눈에" />
  <title>GNW — Game New Watch</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <!-- 홈 화면에 추가(웹앱) 시 사용되는 아이콘 · 이름 -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="GNW" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="controls" aria-label="기간">
    <select id="monthSelect" class="month-select" aria-label="기간 선택"></select>
    <button id="settingsBtn" class="settings-btn" type="button" aria-label="설정" title="설정">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3.2"/>
        <path d="M19.4 12c0-.5 0-.9-.1-1.4l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2.4-1.4L14.2 2H9.8l-.4 2.3a7 7 0 0 0-2.4 1.4l-2.3-1-2 3.4 2 1.5c-.1.5-.1.9-.1 1.4s0 .9.1 1.4l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2.4 1.4l.4 2.3h4.4l.4-2.3a7 7 0 0 0 2.4-1.4l2.3 1 2-3.4-2-1.5c.1-.5.1-.9.1-1.4z" stroke-linejoin="round"/>
      </svg>
    </button>
  </nav>

  <main>
    <div id="gameRoot" class="timeline" aria-live="polite"></div>
    <p id="emptyState" class="empty-state" hidden>조건에 맞는 게임이 없습니다.</p>
  </main>

  <footer class="app-footer">
    <p id="sources" class="sources"></p>
    <p class="footer-meta">
      <span id="lastUpdated"></span>
      <span class="footer-dot">·</span>
      <span>웹앱 + iOS 위젯</span>
    </p>
  </footer>

  <!-- 하단 플랫폼 탭 (전체 · 모바일 · PC · 콘솔) — 콘텐츠 좌우 스와이프로도 전환 -->
  <nav class="tabbar" id="platformTabs" role="tablist" aria-label="플랫폼">
    <button class="tab active" type="button" role="tab" data-cat="all" aria-selected="true">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>전체</span>
    </button>
    <button class="tab" type="button" role="tab" data-cat="모바일" aria-selected="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="2" width="10" height="20" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"/><line x1="10.5" y1="18.5" x2="13.5" y2="18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>모바일</span>
    </button>
    <button class="tab" type="button" role="tab" data-cat="PC" aria-selected="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2.5" y="4" width="19" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="8" y1="20" x2="16" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="16" x2="12" y2="20" stroke="currentColor" stroke-width="2"/></svg>
      <span>PC</span>
    </button>
    <button class="tab" type="button" role="tab" data-cat="콘솔" aria-selected="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8h10a4 4 0 0 1 4 4l.6 4.2A2.4 2.4 0 0 1 17 18l-1.5-2h-7L7 18a2.4 2.4 0 0 1-4.6-1.8L3 12a4 4 0 0 1 4-4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><line x1="6.5" y1="12" x2="9.5" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="10.5" x2="8" y2="13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="15.5" cy="11.5" r="1.1" fill="currentColor"/><circle cx="17.5" cy="13.5" r="1.1" fill="currentColor"/></svg>
      <span>콘솔</span>
    </button>
  </nav>

  <!-- 설정: 앱 아이콘(테마) 변경 -->
  <div id="settingsSheet" class="sheet-overlay" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-label="앱 아이콘 변경">
      <div class="sheet-head">
        <h2>앱 아이콘</h2>
        <button id="settingsClose" class="sheet-close" type="button" aria-label="닫기">✕</button>
      </div>
      <div class="icon-grid" id="iconGrid"></div>
      <p class="sheet-note">아이콘을 고른 뒤 사파리 <b>공유 → 홈 화면에 추가</b>(이미 추가했다면 삭제 후 다시 추가)하면 홈 화면에 적용됩니다.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
